services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./services/backend
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/demo
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

  loadgen:
    build: ./services/loadgen
    environment:
      FRONTEND_URL: http://frontend:8080
      RPS: "5"
    depends_on:
      - frontend
