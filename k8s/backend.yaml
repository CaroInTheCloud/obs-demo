# Memory limit is intentionally LOW (128Mi) so POST /chaos/oom kills the pod quickly.
# Baseline app sits well under this limit under normal operation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
    service: backend
    env: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        service: backend
        env: demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: backend
          image: ${ECR_REGISTRY}/obs-demo/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://demo:demo@postgres.demo.svc.cluster.local:5432/demo
            - name: ERROR_RATE
              value: "0.05"
            - name: CPU_INTENSITY
              value: "0"
            - name: CRASH_ON_BOOT
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
    service: backend
    env: demo
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
